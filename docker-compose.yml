version: "3.8"

services:
  training-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
        NEXT_PUBLIC_WHOOP_CLIENT_ID: ${WHOOP_CLIENT_ID}
    container_name: training-dashboard
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/training.db
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_REFRESH_TOKEN: ${STRAVA_REFRESH_TOKEN}
      WHOOP_CLIENT_ID: ${WHOOP_CLIENT_ID}
      WHOOP_CLIENT_SECRET: ${WHOOP_CLIENT_SECRET}
      WHOOP_REFRESH_TOKEN: ${WHOOP_REFRESH_TOKEN}
      CRON_SCHEDULE: ${CRON_SCHEDULE:-0 5 * * *}
    volumes:
      - training-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  training-data:
    driver: local
